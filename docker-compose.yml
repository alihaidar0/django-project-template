# ============================================================
#  docker-compose.yml — Django Project Dev Stack
#
#  Pull your dev container image then start coding.
#  All services share the same network and mounted workspace.
#
#  Services:
#    app         → Django dev container   :8000
#    db          → PostgreSQL 17          :5432
#    redis       → Redis 8                :6379
#    celery      → Celery worker
#    celery-beat → Celery scheduler
#    mailpit     → Email catcher UI       :8025
# ============================================================

name: django-project

services:

  app:
    image: ${DOCKERHUB_USERNAME:-alihaidar199527}/django-devcontainer:latest
    container_name: django_app
    restart: unless-stopped
    volumes:
      - .:/workspace:cached
      - ${USERPROFILE}/.gitconfig:/root/.gitconfig:ro
      - ${USERPROFILE}/.ssh:/root/.ssh:ro
      - uv-cache:/root/.cache/uv
      - shell-history:/root/.shell_history
    environment:
      GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DATABASE_URL: postgres://${POSTGRES_USER:-django}:${POSTGRES_PASSWORD:-django_pass}@db:5432/${POSTGRES_DB:-django_dev}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      EMAIL_HOST: mailpit
      EMAIL_PORT: "1025"
    ports:
      - "8000:8000"
      - "5678:5678"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /workspace
    command: sleep infinity
    networks:
      - django-network

  db:
    image: postgres:17-alpine
    container_name: django_postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-django_dev}
      POSTGRES_USER: ${POSTGRES_USER:-django}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-django_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-django} -d ${POSTGRES_DB:-django_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - django-network

  redis:
    image: redis:8-alpine
    container_name: django_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - django-network

  celery:
    image: ${DOCKERHUB_USERNAME:-alihaidar199527}/django-devcontainer:latest
    container_name: django_celery
    restart: unless-stopped
    volumes:
      - .:/workspace:cached
      - uv-cache:/root/.cache/uv
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-django}:${POSTGRES_PASSWORD:-django_pass}@db:5432/${POSTGRES_DB:-django_dev}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - db
      - redis
    working_dir: /workspace
    command: >
      sh -c "
        if [ -f manage.py ]; then
          celery -A config worker -l INFO --pool=solo
        else
          echo 'Waiting for Django project...' && sleep infinity
        fi
      "
    networks:
      - django-network

  celery-beat:
    image: ${DOCKERHUB_USERNAME:-alihaidar199527}/django-devcontainer:latest
    container_name: django_celery_beat
    restart: unless-stopped
    volumes:
      - .:/workspace:cached
      - uv-cache:/root/.cache/uv
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://${POSTGRES_USER:-django}:${POSTGRES_PASSWORD:-django_pass}@db:5432/${POSTGRES_DB:-django_dev}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - db
      - redis
    working_dir: /workspace
    command: >
      sh -c "
        if [ -f manage.py ]; then
          celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
        else
          echo 'Waiting for Django project...' && sleep infinity
        fi
      "
    networks:
      - django-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: django_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - django-network

volumes:
  postgres-data:
  redis-data:
  uv-cache:
  shell-history:

networks:
  django-network:
    driver: bridge
