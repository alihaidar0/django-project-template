# ============================================================
#  .github/workflows/ci.yml
#
#  Runs on every push and every PR.
#  feature/* → CI only
#  develop   → CI → docker.yml
#  main      → docker.yml → deploy.yml (CI ran on PR)
# ============================================================

name: CI

on:
  push:
    branches:
      - develop
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  DJANGO_SETTINGS_MODULE: config.settings.testing
  SECRET_KEY: ci-dummy-secret-key
  DATABASE_URL: sqlite:///ci-test.db
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - run: ruff check . --output-format=github
      - run: ruff format . --check

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
      - run: mypy config/ apps/ --ignore-missing-imports --no-error-summary

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://test_user:test_pass@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
      - name: Run tests
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: pip-audit
        run: |
          pip install pip-audit uv
          uv pip install --system -e "."
          pip-audit --skip-editable || true
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: docker/Dockerfile.prod
          severity: CRITICAL,HIGH
          exit-code: 0

  ci-passed:
    name: CI Passed ✅
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then echo "❌ Lint failed" && exit 1; fi
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then echo "❌ Typecheck failed" && exit 1; fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then echo "❌ Tests failed" && exit 1; fi
          echo "✅ All CI gates passed"
